<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinemania - Katalog</title>
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/catalog.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="./index.html" class="logo">Cinemania</a>
      <nav class="nav">
        <a href="./index.html" class="nav__link">Ana Sayfa</a>
        <a href="./catalog.html" class="nav__link nav__link--active">Katalog</a>
        <a href="./library.html" class="nav__link">Kütüphanem</a>
      </nav>
      <button class="theme-toggle" id="themeToggle" aria-label="Tema değiştir">
        <span class="theme-toggle__icon">🌙</span>
      </button>
    </div>
  </header>

  <main>
    <section class="catalog-hero">
      <div class="container">
        <h1 class="catalog-hero__title">Film Kataloğu</h1>
        <form class="search" id="searchForm">
          <input 
            type="text" 
            class="search__input" 
            id="searchInput" 
            placeholder="Film ara..."
            autocomplete="off"
          >
          <select class="search__select" id="yearSelect">
            <option value="">Tüm Yıllar</option>
          </select>
          <button type="submit" class="search__btn">Ara</button>
        </form>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="catalog__results" id="catalogResults"></div>
        <div class="pagination" id="pagination"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p class="footer__text">© 2024 Cinemania. Tüm hakları saklıdır.</p>
      <button class="footer__team" id="teamBtn">Ekibimiz</button>
    </div>
  </footer>

  <div class="modal" id="modal">
    <div class="modal__backdrop"></div>
    <div class="modal__content">
      <button class="modal__close" id="modalClose">&times;</button>
      <div class="modal__body" id="modalBody"></div>
    </div>
  </div>

  <div class="loader" id="loader">
    <div class="loader__spinner"></div>
  </div>

  <button class="scroll-top" id="scrollTop" aria-label="Yukarı çık">↑</button>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
