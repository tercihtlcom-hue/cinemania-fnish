<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinemania - Kütüphanem</title>
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/library.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="./index.html" class="logo">Cinemania</a>
      <nav class="nav">
        <a href="./index.html" class="nav__link">Ana Sayfa</a>
        <a href="./catalog.html" class="nav__link">Katalog</a>
        <a href="./library.html" class="nav__link nav__link--active">Kütüphanem</a>
      </nav>
      <button class="theme-toggle" id="themeToggle" aria-label="Tema değiştir">
        <span class="theme-toggle__icon">🌙</span>
      </button>
    </div>
  </header>

  <main>
    <section class="library-hero">
      <div class="container">
        <h1 class="library-hero__title">Kütüphanem</h1>
        <p class="library-hero__desc">Kaydettiğin filmler burada</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="library__filters" id="libraryFilters"></div>
        <div class="library__results" id="libraryResults"></div>
        <button class="btn btn--load" id="loadMoreBtn" style="display:none;">Daha Fazla</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p class="footer__text">© 2024 Cinemania. Tüm hakları saklıdır.</p>
      <button class="footer__team" id="teamBtn">Ekibimiz</button>
    </div>
  </footer>

  <div class="modal" id="modal">
    <div class="modal__backdrop"></div>
    <div class="modal__content">
      <button class="modal__close" id="modalClose">&times;</button>
      <div class="modal__body" id="modalBody"></div>
    </div>
  </div>

  <div class="loader" id="loader">
    <div class="loader__spinner"></div>
  </div>

  <button class="scroll-top" id="scrollTop" aria-label="Yukarı çık">↑</button>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
